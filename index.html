Palette: Neon Cyber (Deep Navy #0F172A, Cyan #06B6D4, Pink #EC4899, Indigo #6366F1)

1. Overview: Compact KPIs optimized for iframe height constraints.
2. Content Density: Bar chart comparing chapter counts (max height 250px for iframe fitting).
3. Topic Distribution: Doughnut chart showing theme frequency (max height 250px).
4. Smart Index: Searchable directory with a STICKY search bar so it remains accessible while scrolling the iframe.
Visualizations:
- Data Point: Chapters per Video -> Goal: Compare -> Visualization: Bar Chart -> Justification: Chart.js Canvas. NO SVG used.
- Data Point: Core Themes -> Goal: Organize -> Visualization: Doughnut Chart -> Justification: Chart.js Canvas. NO SVG used.
Confirmation: NEITHER Mermaid JS NOR SVG were used anywhere in the output.
-->

let rawData = [];
let densityChartInstance = null;
let themeChartInstance = null;

function categorizeChapter(title) {
    const t = title.toLowerCase();
    if (t.includes('line') || t.includes('offset') || t.includes('trim') || t.includes('extend') || t.includes('snap') || t.includes('cad') || t.includes('draft') || t.includes('draw') || t.includes('wall') || t.includes('slice') || t.includes('ramp') || t.includes('vport') || t.includes('clip') || t.includes('poly')) return 'CAD Commands & Drafting';
    if (t.includes('setup') || t.includes('config') || t.includes('license') || t.includes('server') || t.includes('manager') || t.includes('toolbar') || t.includes('core') || t.includes('cloudworx') || t.includes('software') || t.includes('layer') || t.includes('prop')) return 'Software Setup & Config';
    if (t.includes('data') || t.includes('import') || t.includes('export') || t.includes('save') || t.includes('lgs') || t.includes('database') || t.includes('folder') || t.includes('project') || t.includes('history')) return 'Data Management';
    return 'Support & General';
}

function parseCSV(csvText) {
    const parsed = [];
    let currentVideo = null;
    const lines = csvText.split('\n');
    
    for(let i=1; i<lines.length; i++) {
        const line = lines[i].trim();
        if(!line) continue;
        
        const commaIndex = line.indexOf(',');
        if (commaIndex === -1) continue;

        let col1 = line.substring(0, commaIndex).trim();
        let col2 = line.substring(commaIndex + 1).trim();

        if (col1.startsWith('"') && col1.endsWith('"')) col1 = col1.slice(1, -1);
        if (col2.startsWith('"') && col2.endsWith('"')) col2 = col2.slice(1, -1);

        if (col1) {
            const match = col1.match(/^(AC\d+\.\d+)\s+(.*)$/i);
            let id = col1;
            let title = col1;
            if (match) {
                id = match[1];
                title = match[2];
            }
            currentVideo = { id: id, title: title, chapters: [] };
            parsed.push(currentVideo);
        }

        if (col2 && currentVideo) {
            const timeMatch = col2.match(/^(\d{2}:\d{2}:\d{2})\s+(.*)$/);
            if (timeMatch) {
                currentVideo.chapters.push({ time: timeMatch[1], title: timeMatch[2] });
            } else {
                currentVideo.chapters.push({ time: "--:--:--", title: col2 });
            }
        }
    }
    return parsed;
}

function wrapLabel(label) {
    if (label.length <= 16) return label;
    const words = label.split(' ');
    const lines = [];
    let currentLine = '';
    for (const word of words) {
        if ((currentLine + word).length > 16) {
            if (currentLine) lines.push(currentLine.trim());
            currentLine = word + ' ';
        } else {
            currentLine += word + ' ';
        }
    }
    if (currentLine) lines.push(currentLine.trim());
    return lines;
}

function initializeDashboard(newData = null) {
    if (newData) {
        rawData = newData;
    } else {
        rawData = parseCSV(embeddedCSV);
    }
    
    document.getElementById('statVideos').textContent = rawData.length;
    const totalChapters = rawData.reduce((sum, v) => sum + v.chapters.length, 0);
    document.getElementById('statChapters').textContent = totalChapters;

    const rawDensityLabels = rawData.map(v => v.id + ' ' + v.title);
    const wrappedDensityLabels = rawDensityLabels.map(wrapLabel);
    const densityData = rawData.map(v => v.chapters.length);
    
    let themeCounts = {
        "CAD Commands & Drafting": 0,
        "Software Setup & Config": 0,
        "Data Management": 0,
        "Support & General": 0
    };
    
    rawData.forEach(v => {
        v.chapters.forEach(ch => {
            themeCounts[categorizeChapter(ch.title)]++;
        });
    });

    const themeLabelsRaw = Object.keys(themeCounts);
    const wrappedThemeLabels = themeLabelsRaw.map(wrapLabel);
    const themeData = Object.values(themeCounts);

    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = 'ui-sans-serif, system-ui, sans-serif';

    if (densityChartInstance) densityChartInstance.destroy();
    const densityCtx = document.getElementById('densityChart').getContext('2d');
    densityChartInstance = new Chart(densityCtx, {
        type: 'bar',
        data: {
            labels: wrappedDensityLabels,
            datasets: [{
                label: 'Chapters',
                data: densityData,
                backgroundColor: '#06b6d4',
                borderRadius: 4,
                barPercentage: 0.7
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#1e293b',
                    titleColor: '#f8fafc',
                    bodyColor: '#cbd5e1',
                    borderColor: '#334155',
                    borderWidth: 1,
                    callbacks: {
                        title: function(tooltipItems) {
                            const item = tooltipItems[0];
                            let label = item.chart.data.labels[item.dataIndex];
                            return Array.isArray(label) ? label.join(' ') : label;
                        }
                    }
                }
            },
            scales: {
                y: { 
                    beginAtZero: true, 
                    grid: { color: '#334155', tickLength: 0 }, 
                    ticks: { stepSize: 5, padding: 8 } 
                },
                x: { 
                    grid: { display: false },
                    ticks: { maxRotation: 45, minRotation: 45, autoSkip: false, font: {size: 10} }
                }
            }
        }
    });

    if (themeChartInstance) themeChartInstance.destroy();
    const themeCtx = document.getElementById('themeChart').getContext('2d');
    themeChartInstance = new Chart(themeCtx, {
        type: 'doughnut',
        data: {
            labels: wrappedThemeLabels,
            datasets: [{
                data: themeData,
                backgroundColor: ['#6366f1', '#ec4899', '#06b6d4', '#8b5cf6'],
                borderWidth: 0,
                hoverOffset: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            layout: { padding: 10 },
            plugins: {
                legend: { 
                    position: 'right', 
                    labels: { color: '#f8fafc', padding: 15, font: { size: 11 }, boxWidth: 12 } 
                },
                tooltip: {
                    backgroundColor: '#1e293b',
                    titleColor: '#f8fafc',
                    bodyColor: '#cbd5e1',
                    borderColor: '#334155',
                    borderWidth: 1,
                    callbacks: {
                        title: function(tooltipItems) {
                            const item = tooltipItems[0];
                            let label = item.chart.data.labels[item.dataIndex];
                            return Array.isArray(label) ? label.join(' ') : label;
                        }
                    }
                }
            }
        }
    });

    renderDirectory(rawData);
}

function highlightText(text, query) {
    if (!query) return text;
    const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<span class="search-highlight">$1</span>');
}

function renderDirectory(data, query = '') {
    directoryList.innerHTML = '';
    let totalMatches = 0;
    
    data.forEach(video => {
        let matchingChapters = video.chapters;
        let videoTitleMatch = false;

        if (query) {
            const q = query.toLowerCase();
            videoTitleMatch = video.title.toLowerCase().includes(q) || video.id.toLowerCase().includes(q);
            
            if (!videoTitleMatch) {
                matchingChapters = video.chapters.filter(ch => ch.title.toLowerCase().includes(q));
            }
        }

        if (matchingChapters.length > 0) {
            totalMatches += matchingChapters.length;
            
            const card = document.createElement('div');
            card.className = 'bg-slate-900 border border-slate-700 rounded overflow-hidden';
            
            const header = document.createElement('div');
            header.className = 'bg-slate-800 px-4 py-3 flex flex-row items-center justify-between gap-2 border-b border-slate-700';
            
            const titleHTML = highlightText(`${video.id}: ${video.title}`, query);
            
            header.innerHTML = `
                <h3 class="text-sm md:text-base font-bold text-slate-100 flex items-center gap-2">
                    &#128250; <span class="truncate">${titleHTML}</span>
                </h3>
                <span class="text-[10px] font-semibold bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded-full whitespace-nowrap">
                    ${matchingChapters.length} Matches
                </span>
            `;
            
            const list = document.createElement('ul');
            list.className = 'divide-y divide-slate-800/50';
            
            matchingChapters.forEach(ch => {
                const li = document.createElement('li');
                li.className = 'px-4 py-2 flex items-start gap-3 hover:bg-slate-800/50 transition-colors group';
                
                const chTitleHTML = highlightText(ch.title, query);
                
                li.innerHTML = `
                    <span class="font-mono text-cyan-400 text-xs mt-0.5 group-hover:text-cyan-300 shrink-0">
                        &#9202; ${ch.time}
                    </span>
                    <span class="text-slate-300 text-xs sm:text-sm leading-tight">
                        ${chTitleHTML}
                    </span>
                `;
                list.appendChild(li);
            });
            
            card.appendChild(header);
            card.appendChild(list);
            directoryList.appendChild(card);
        }
    });

    if (totalMatches === 0 && query !== '') {
        noResults.classList.remove('hidden');
        resultsSummary.classList.add('hidden');
    } else {
        noResults.classList.add('hidden');
        if (query !== '') {
            resultsSummary.textContent = `Found ${totalMatches} matching chapter(s)`;
            resultsSummary.classList.remove('hidden');
        } else {
            resultsSummary.classList.add('hidden');
        }
    }
}

searchInput.addEventListener('input', (e) => {
    const query = e.target.value.trim();
    renderDirectory(rawData, query);
});

document.getElementById('csvFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        const parsedData = parseCSV(text);
        if (parsedData.length > 0) {
            initializeDashboard(parsedData);
            const currentSearch = document.getElementById('searchInput').value.trim();
            if (currentSearch) renderDirectory(parsedData, currentSearch);
        } else {
            alert("Could not parse the CSV file. Please ensure it matches the correct format.");
        }
    };
    reader.readAsText(file);
    e.target.value = '';
});

// Initialize on load
window.onload = () => initializeDashboard();

</script>
</body>
